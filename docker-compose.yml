services:
  dbus:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    command: ["/workspace/docker/dbus-entrypoint.sh"]
    volumes:
      - ./:/workspace
      - bus:/bus

  daemon:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    working_dir: /workspace
    environment:
      - DBUS_SESSION_BUS_ADDRESS=unix:path=/bus/session-bus
      - RUST_LOG=info
      - CARGO_HOME=/cargo
      - CARGO_TARGET_DIR=/target
    depends_on:
      - dbus
    volumes:
      - ./:/workspace
      - bus:/bus
      - cargo:/cargo
      - target:/target
    command: ["cargo", "run", "-p", "mixctl-daemon"]

  cli:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    working_dir: /workspace
    environment:
      - DBUS_SESSION_BUS_ADDRESS=unix:path=/bus/session-bus
      - CARGO_HOME=/cargo
      - CARGO_TARGET_DIR=/target
    depends_on:
      - dbus
    volumes:
      - ./:/workspace
      - bus:/bus
      - cargo:/cargo
      - target:/target
    command: ["cargo", "run", "-p", "mixctl-cli", "--", "status"]

volumes:
  bus:
  cargo:
  target:
