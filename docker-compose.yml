services:
  dbus:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    command: ["/workspace/docker/dbus-entrypoint.sh"]
    volumes:
      - ./:/workspace
      - bus:/bus

  pipewire:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    command: ["/workspace/docker/pipewire-entrypoint.sh"]
    environment:
      - DBUS_SESSION_BUS_ADDRESS=unix:path=/bus/session-bus
      - XDG_RUNTIME_DIR=/run/pipewire
    depends_on:
      - dbus
    volumes:
      - ./:/workspace
      - bus:/bus
      - pwrun:/run/pipewire

  daemon:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    working_dir: /workspace
    environment:
      - DBUS_SESSION_BUS_ADDRESS=unix:path=/bus/session-bus
      - PIPEWIRE_RUNTIME_DIR=/run/pipewire
      - XDG_RUNTIME_DIR=/run/pipewire
      - RUST_LOG=info
      - CARGO_HOME=/cargo
      - CARGO_TARGET_DIR=/target
    depends_on:
      - dbus
      - pipewire
    volumes:
      - ./:/workspace
      - bus:/bus
      - pwrun:/run/pipewire
      - cargo:/cargo
      - target:/target
    command: ["cargo", "run", "-p", "mixctl-daemon"]

  cli:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    working_dir: /workspace
    environment:
      - DBUS_SESSION_BUS_ADDRESS=unix:path=/bus/session-bus
      - CARGO_HOME=/cargo
      - CARGO_TARGET_DIR=/target
    depends_on:
      - dbus
    volumes:
      - ./:/workspace
      - bus:/bus
      - cargo:/cargo
      - target:/target
    command: ["cargo", "run", "-p", "mixctl-cli", "--", "status"]

  # Interactive shell for testing — run with: docker compose run --rm shell
  shell:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    working_dir: /workspace
    environment:
      - DBUS_SESSION_BUS_ADDRESS=unix:path=/bus/session-bus
      - PIPEWIRE_RUNTIME_DIR=/run/pipewire
      - XDG_RUNTIME_DIR=/run/pipewire
      - RUST_LOG=info
      - CARGO_HOME=/cargo
      - CARGO_TARGET_DIR=/target
    depends_on:
      - dbus
      - pipewire
    volumes:
      - ./:/workspace
      - bus:/bus
      - pwrun:/run/pipewire
      - cargo:/cargo
      - target:/target
    profiles: [debug]
    stdin_open: true
    tty: true
    entrypoint: /bin/bash

  monitor:
    image: debian:bookworm-slim
    environment:
      - DBUS_SESSION_BUS_ADDRESS=unix:path=/bus/session-bus
    depends_on:
      - dbus
    volumes:
      - bus:/bus
    profiles: [debug]
    command:
      [
        "sh",
        "-c",
        "apt-get update -qq && apt-get install -y -qq dbus >/dev/null 2>&1 && dbus-monitor --session",
      ]

volumes:
  bus:
  pwrun:
  cargo:
  target:
