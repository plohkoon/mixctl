<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0e0e18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6c8cff"/>
      <stop offset="100%" stop-color="#4a6adf"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a7aef"/>
      <stop offset="100%" stop-color="#3a5acf"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#6c8cff"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="8" y="8" width="496" height="496" rx="100" ry="100" fill="none" stroke="rgba(108,140,255,0.15)" stroke-width="2"/>

  <!-- "M" letter - large, upper portion, centered -->
  <path d="
    M 56 340
    L 56 90
    L 130 90
    L 210 220
    L 290 90
    L 364 90
    L 364 340
    L 310 340
    L 310 190
    L 220 308
    L 200 308
    L 110 190
    L 110 340
    Z
  " fill="url(#accent)"/>

  <!-- "C" letter - smaller, hanging off the right side of M, below center -->
  <path d="
    M 456 248
    L 416 248
    C 408 228, 398 220, 382 220
    C 352 220, 340 250, 340 300
    C 340 350, 352 380, 382 380
    C 398 380, 408 372, 416 352
    L 456 352
    C 446 384, 422 405, 382 405
    C 328 405, 300 362, 300 300
    C 300 238, 328 195, 382 195
    C 422 195, 446 216, 456 248
    Z
  " fill="url(#accent2)"/>

  <!-- Sound waveform - horizontal band through the center -->
  <g opacity="0.95">
    <!-- Waveform bars centered at y=300, extending up and down -->
    <rect x="40"  y="288" width="5" height="24" rx="2.5" fill="url(#wave)" opacity="0.4"/>
    <rect x="54"  y="280" width="5" height="40" rx="2.5" fill="url(#wave)" opacity="0.5"/>
    <rect x="68"  y="274" width="5" height="52" rx="2.5" fill="url(#wave)" opacity="0.55"/>
    <rect x="82"  y="268" width="5" height="64" rx="2.5" fill="url(#wave)" opacity="0.6"/>
    <rect x="96"  y="262" width="5" height="76" rx="2.5" fill="url(#wave)" opacity="0.65"/>
    <rect x="110" y="270" width="5" height="60" rx="2.5" fill="url(#wave)" opacity="0.7"/>
    <rect x="124" y="258" width="5" height="84" rx="2.5" fill="url(#wave)" opacity="0.75"/>
    <rect x="138" y="264" width="5" height="72" rx="2.5" fill="url(#wave)" opacity="0.8"/>
    <rect x="152" y="254" width="5" height="92" rx="2.5" fill="url(#wave)" opacity="0.85"/>
    <rect x="166" y="260" width="5" height="80" rx="2.5" fill="url(#wave)" opacity="0.87"/>
    <rect x="180" y="248" width="5" height="104" rx="2.5" fill="url(#wave)" opacity="0.9"/>
    <rect x="194" y="256" width="5" height="88" rx="2.5" fill="url(#wave)" opacity="0.92"/>
    <rect x="208" y="244" width="5" height="112" rx="2.5" fill="url(#wave)" opacity="0.94"/>
    <rect x="222" y="252" width="5" height="96" rx="2.5" fill="url(#wave)" opacity="0.95"/>
    <rect x="236" y="240" width="5" height="120" rx="2.5" fill="url(#wave)"/>
    <rect x="250" y="248" width="5" height="104" rx="2.5" fill="url(#wave)"/>
    <rect x="264" y="238" width="5" height="124" rx="2.5" fill="url(#wave)"/>
    <rect x="278" y="246" width="5" height="108" rx="2.5" fill="url(#wave)"/>
    <rect x="292" y="242" width="5" height="116" rx="2.5" fill="url(#wave)" opacity="0.95"/>
    <rect x="306" y="250" width="5" height="100" rx="2.5" fill="url(#wave)" opacity="0.92"/>
    <rect x="320" y="246" width="5" height="108" rx="2.5" fill="url(#wave)" opacity="0.9"/>
    <rect x="334" y="254" width="5" height="92" rx="2.5" fill="url(#wave)" opacity="0.87"/>
    <rect x="348" y="250" width="5" height="100" rx="2.5" fill="url(#wave)" opacity="0.85"/>
    <rect x="362" y="258" width="5" height="84" rx="2.5" fill="url(#wave)" opacity="0.82"/>
    <rect x="376" y="254" width="5" height="92" rx="2.5" fill="url(#wave)" opacity="0.8"/>
    <rect x="390" y="262" width="5" height="76" rx="2.5" fill="url(#wave)" opacity="0.75"/>
    <rect x="404" y="258" width="5" height="84" rx="2.5" fill="url(#wave)" opacity="0.7"/>
    <rect x="418" y="266" width="5" height="68" rx="2.5" fill="url(#wave)" opacity="0.65"/>
    <rect x="432" y="274" width="5" height="52" rx="2.5" fill="url(#wave)" opacity="0.55"/>
    <rect x="446" y="280" width="5" height="40" rx="2.5" fill="url(#wave)" opacity="0.5"/>
    <rect x="460" y="288" width="5" height="24" rx="2.5" fill="url(#wave)" opacity="0.4"/>
  </g>

  <!-- Subtle glow behind waveform -->
  <ellipse cx="256" cy="300" rx="200" ry="40" fill="url(#wave)" opacity="0.05"/>
</svg>
