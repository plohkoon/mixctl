name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libclang-dev pkg-config

      - name: Install cross-compilation tools (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }} \
            -p mixctl-daemon \
            -p mixctl-cli \
            -p mixctl-tui \
            -p mixctl-beacn-daemon

      - name: Package
        run: |
          mkdir -p dist-pkg
          cp target/${{ matrix.target }}/release/mixctl-daemon dist-pkg/
          cp target/${{ matrix.target }}/release/mixctl-cli dist-pkg/
          cp target/${{ matrix.target }}/release/mixctl-tui dist-pkg/
          cp target/${{ matrix.target }}/release/mixctl-beacn-daemon dist-pkg/
          cp -r dist/systemd dist-pkg/
          cp -r dist/udev dist-pkg/
          cp LICENSE dist-pkg/
          cp README.md dist-pkg/
          tar czf mixctl-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C dist-pkg .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mixctl-${{ matrix.target }}
          path: mixctl-*.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: mixctl-*.tar.gz
          generate_release_notes: true
